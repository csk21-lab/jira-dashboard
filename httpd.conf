<VirtualHost *:443>
    ServerName confluence.example.com

    # SSL config here...

    # Redirect only "/" (no path) to other URL
    RedirectMatch 302 ^/$ https://some-other-url.example.com/login

    ProxyRequests Off
    ProxyPreserveHost On

    ProxyPass        / http://confluence:8090/
    ProxyPassReverse / http://confluence:8090/
</VirtualHost>
