


<VirtualHost *:443>
    ServerName wiki.com
    ...

    RewriteEngine On
    RewriteRule ^/$ https://fs.sample.com/adfs/ls/idpinitiatedsignon.aspx?LoginToRP=https://wiki.com/confluence/ [R=302,L]
    RewriteRule ^/confluence/?$ https://fs.sample.com/adfs/ls/idpinitiatedsignon.aspx?LoginToRP=https://wiki.com/confluence/ [R=302,L]

    ProxyPass        /confluence http://testconf.build.com:8090/confluence
    ProxyPassReverse /confluence http://testconf.build.com:8090/confluence
    <Location /confluence>
        Require all granted
    </Location>
</VirtualHost>


Confluence-Dev is the display name of the Relying Party Trust, not the identifier you should use in LoginToRP.

You need the Relying Party Identifier value:

On the ADFS server, open AD FS Management.

Go to Relying Party Trusts → right‑click Confluence-Dev → Properties.

Go to the Identifiers tab.

Under “Relying party identifiers” you will see one or more values (e.g. https://wiki.com/saml, urn:confluence:dev, etc.). Copy the exact one used as the identifier.

Then your ADFS URL should be:

text
https://fs.sample.com/adfs/ls/idpinitiatedsignon.aspx?LoginToRP=<that_exact_identifier>
Example (if the identifier is https://wiki.com/saml):

text
https://fs.sample.com/adfs/ls/idpinitiatedsignon.aspx?LoginToRP=https://wiki.com/saml
Use this same URL in your Apache rules:

text
RewriteRule ^/$ https://fs.sample.com/adfs/ls/idpinitiatedsignon.aspx?LoginToRP=https://wiki.com/saml [R=302,L]
RewriteRule ^/confluence/?$ https://fs.sample.com/adfs/ls/idpinitiatedsignon.aspx?LoginToRP=https://wiki.com/saml [R=302,L]
If you paste the identifier string you see on the Identifiers tab (you can mask part of the domain), I’ll give you the exact final URL and RewriteRule lines.

